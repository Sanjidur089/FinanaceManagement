<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinWallet BD - Smart Financial Management</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Outfit', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .glass-dark {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .gradient-bg {
      background: linear-gradient(135deg, #f0f4ff 0%, #fef3f2 30%, #f0fdf4 60%, #faf5ff 100%);
    }
    .progress-bar { transition: width 1s ease; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .float-anim { animation: float 4s ease-in-out infinite; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .sidebar-link { transition: all 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(99,102,241,0.1); color: #6366f1; }
    body { box-sizing: border-box; }
  </style>
 </head>
 <body class="h-full overflow-auto gradient-bg">
  <div id="app" class="w-full h-full"></div>

  <script>
    const defaultConfig = {
      hero_title: "Your AI-Powered Financial Companion",
      hero_subtitle: "Spend smarter with intelligent insights. Track, budget, and grow your wealth with personalized recommendations.",
      background_color: "#f0f4ff",
      surface_color: "#ffffff",
      text_color: "#1e293b",
      primary_color: "#6366f1",
      secondary_color: "#94a3b8",
      font_family: "Outfit",
      font_size: 16
    };

    let currentPage = 'home';

    function navigate(page) {
      currentPage = page;
      render();
    }

    function render() {
      const config = window.elementSdk?.config || defaultConfig;
      const app = document.getElementById('app');
      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;
      const primary = config.primary_color || defaultConfig.primary_color;
      const text = config.text_color || defaultConfig.text_color;

      app.style.fontFamily = `${font}, sans-serif`;
      app.style.fontSize = `${size}px`;
      app.style.color = text;

      if (currentPage === 'home') renderHome(app, config);
      else if (currentPage === 'login') renderLogin(app, config);
      else if (currentPage === 'register') renderRegister(app, config);
      else if (currentPage === 'dashboard') renderDashboard(app, config);
      else if (currentPage === 'admin') renderAdmin(app, config);

      lucide.createIcons();
    }

    function renderHome(app, c) {
      const primary = c.primary_color || defaultConfig.primary_color;
      const title = c.hero_title || defaultConfig.hero_title;
      const subtitle = c.hero_subtitle || defaultConfig.hero_subtitle;
      app.innerHTML = `
        <nav class="glass fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${primary}"><i data-lucide="wallet" class="w-4 h-4 text-white"></i></div>
            <span class="font-semibold text-lg">FinWallet</span>
          </div>
          <div class="hidden md:flex gap-6 text-sm" style="color:${c.secondary_color||defaultConfig.secondary_color}">
            <a href="#" class="hover:opacity-70">Features</a><a href="#" class="hover:opacity-70">Pricing</a><a href="#" class="hover:opacity-70">About</a>
          </div>
          <div class="flex gap-3">
            <button onclick="navigate('login')" class="px-4 py-2 text-sm rounded-lg border hover:opacity-80" style="border-color:${primary};color:${primary}">Sign In</button>
            <button onclick="navigate('register')" class="px-4 py-2 text-sm rounded-lg text-white" style="background:${primary}">Get Started</button>
          </div>
        </nav>

        <section class="pt-32 pb-20 px-6 max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12">
          <div class="flex-1 fade-in">
            <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-5" id="hero-title">${title}</h1>
            <p class="text-lg mb-8 opacity-70" id="hero-subtitle">${subtitle}</p>
            <div class="flex gap-3">
              <button onclick="navigate('dashboard')" class="px-6 py-3 rounded-xl text-white font-medium shadow-lg shadow-indigo-200" style="background:${primary}">View Dashboard</button>
              <button class="px-6 py-3 rounded-xl font-medium glass">Learn More</button>
            </div>
          </div>
          <div class="flex-1 float-anim">
            <div class="glass rounded-2xl p-6 shadow-xl max-w-sm mx-auto">
              <div class="flex justify-between items-center mb-4"><span class="text-sm font-medium">Monthly Savings</span><span class="text-xs px-2 py-1 rounded-full" style="background:${primary}20;color:${primary}">+12.5%</span></div>
              <div class="text-3xl font-bold mb-2">৳45,280</div>
              <div class="flex gap-1 h-16 items-end">
                ${[40,55,35,65,50,75,60,80,70,90,85,95].map(h=>`<div class="flex-1 rounded-t" style="height:${h}%;background:${primary}${h>70?'':'40'}"></div>`).join('')}
              </div>
            </div>
          </div>
        </section>

        <section class="px-6 pb-20 max-w-5xl mx-auto">
          <div class="grid md:grid-cols-3 gap-6">
            ${[{icon:'brain',title:'AI Insights',desc:'Personalized recommendations powered by machine learning'},{icon:'shield',title:'Secure & Private',desc:'Bank-level encryption for all your financial data'},{icon:'trending-up',title:'Wealth Growth',desc:'Track investments and optimize your portfolio'}].map(f=>`
              <div class="glass rounded-2xl p-6 hover:shadow-lg transition-shadow">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style="background:${primary}15"><i data-lucide="${f.icon}" class="w-5 h-5" style="color:${primary}"></i></div>
                <h3 class="font-semibold mb-2">${f.title}</h3>
                <p class="text-sm opacity-60">${f.desc}</p>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderLogin(app, c) {
      const primary = c.primary_color || defaultConfig.primary_color;
      app.innerHTML = `
        <div class="min-h-full flex items-center justify-center px-6 py-12">
          <div class="glass rounded-2xl p-8 w-full max-w-md shadow-xl fade-in">
            <div class="text-center mb-8">
              <div class="w-12 h-12 rounded-xl mx-auto flex items-center justify-center mb-4" style="background:${primary}"><i data-lucide="wallet" class="w-6 h-6 text-white"></i></div>
              <h2 class="text-2xl font-bold">Welcome Back</h2>
              <p class="text-sm opacity-60 mt-1">Sign in to your account</p>
            </div>
            <p class="text-xs text-center opacity-50 mb-4 italic">Demo Only — No data is saved</p>
            <form onsubmit="event.preventDefault();navigate('dashboard')">
              <label for="email" class="text-sm font-medium block mb-1">Email</label>
              <input id="email" type="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 mb-4 focus:outline-none focus:ring-2" style="--tw-ring-color:${primary}">
              <label for="pass" class="text-sm font-medium block mb-1">Password</label>
              <input id="pass" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 mb-6 focus:outline-none focus:ring-2">
              <button type="submit" class="w-full py-3 rounded-xl text-white font-medium" style="background:${primary}">Sign In</button>
            </form>
            <p class="text-sm text-center mt-4 opacity-60">No account? <a href="#" onclick="navigate('register')" class="font-medium" style="color:${primary}">Sign up</a></p>
            <button onclick="navigate('home')" class="mt-4 text-sm opacity-50 hover:opacity-80 block mx-auto">← Back to Home</button>
          </div>
        </div>
      `;
    }

    function renderRegister(app, c) {
      const primary = c.primary_color || defaultConfig.primary_color;
      app.innerHTML = `
        <div class="min-h-full flex items-center justify-center px-6 py-12">
          <div class="glass rounded-2xl p-8 w-full max-w-md shadow-xl fade-in">
            <div class="text-center mb-8">
              <h2 class="text-2xl font-bold">Create Account</h2>
              <p class="text-sm opacity-60 mt-1">Start your financial journey</p>
            </div>
            <p class="text-xs text-center opacity-50 mb-4 italic">Demo Only — No data is saved</p>
            <form onsubmit="event.preventDefault();navigate('dashboard')">
              <label for="name" class="text-sm font-medium block mb-1">Full Name</label>
              <input id="name" type="text" placeholder="John Doe" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 mb-4 focus:outline-none">
              <label for="reg-email" class="text-sm font-medium block mb-1">Email</label>
              <input id="reg-email" type="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/60 mb-6 focus:outline-none">
              <button type="submit" class="w-full py-3 rounded-xl text-white font-medium" style="background:${primary}">Create Account</button>
            </form>
            <p class="text-sm text-center mt-4 opacity-60">Already have an account? <a href="#" onclick="navigate('login')" class="font-medium" style="color:${primary}">Sign in</a></p>
            <button onclick="navigate('home')" class="mt-4 text-sm opacity-50 hover:opacity-80 block mx-auto">← Back to Home</button>
          </div>
        </div>
      `;
    }

    function renderDashboard(app, c) {
      const primary = c.primary_color || defaultConfig.primary_color;
      app.innerHTML = `
        <div class="flex h-full">
          <aside class="hidden md:flex flex-col w-60 glass border-r border-white/20 p-4">
            <div class="flex items-center gap-2 mb-8 px-2">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${primary}"><i data-lucide="wallet" class="w-4 h-4 text-white"></i></div>
              <span class="font-semibold">FinWallet</span>
            </div>
            <nav class="flex-1 space-y-1">
              ${[{icon:'layout-dashboard',label:'Dashboard',active:true},{icon:'credit-card',label:'Transactions'},{icon:'target',label:'Goals'},{icon:'pie-chart',label:'Analytics'},{icon:'brain',label:'AI Advisor'}].map(i=>`
                <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm ${i.active?'active':'opacity-60'}"><i data-lucide="${i.icon}" class="w-4 h-4"></i>${i.label}</a>
              `).join('')}
            </nav>
            <div class="space-y-1 border-t border-gray-200/50 pt-4">
              <a href="#" onclick="navigate('admin')" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm opacity-60"><i data-lucide="shield" class="w-4 h-4"></i>Admin Panel</a>
              <a href="#" onclick="navigate('home')" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm opacity-60"><i data-lucide="log-out" class="w-4 h-4"></i>Sign Out</a>
            </div>
          </aside>

          <main class="flex-1 overflow-auto p-6">
            <header class="flex justify-between items-center mb-8">
              <div><h1 class="text-2xl font-bold">Good Morning, Alex</h1><p class="text-sm opacity-60">Here's your financial overview</p></div>
              <div class="flex items-center gap-4">
                <button class="relative p-2 rounded-lg hover:bg-white/50"><i data-lucide="bell" class="w-5 h-5"></i><span class="absolute top-1 right-1 w-2 h-2 rounded-full" style="background:${primary}"></span></button>
                <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-medium" style="background:${primary}">A</div>
              </div>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
              ${[{label:'Total Balance',val:'৳2,45,630',icon:'wallet',change:'+3.2%'},{label:'Monthly Income',val:'৳82,000',icon:'arrow-down-left',change:'+1.8%'},{label:'Monthly Spending',val:'৳39,200',icon:'arrow-up-right',change:'-5.1%'},{label:'Savings Rate',val:'52%',icon:'piggy-bank',change:'+4.0%'}].map(s=>`
                <div class="glass rounded-xl p-5">
                  <div class="flex justify-between items-start mb-3"><span class="text-xs opacity-60">${s.label}</span><i data-lucide="${s.icon}" class="w-4 h-4 opacity-40"></i></div>
                  <div class="text-xl font-bold">${s.val}</div>
                  <span class="text-xs mt-1 inline-block" style="color:${s.change.startsWith('+')?'#10b981':'#ef4444'}">${s.change}</span>
                </div>
              `).join('')}
            </div>

            <div class="grid lg:grid-cols-3 gap-6 mb-8">
              <div class="lg:col-span-2 glass rounded-xl p-6">
                <h3 class="font-semibold mb-4">Spending Overview</h3>
                <div class="flex items-end gap-2 h-40">
                  ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'].map((m,i)=>{const h=[45,60,35,70,55,80,65,75][i];return`<div class="flex-1 flex flex-col items-center gap-1"><div class="w-full rounded-t" style="height:${h}%;background:${primary}${h>60?'':'50'}"></div><span class="text-xs opacity-50">${m}</span></div>`}).join('')}
                </div>
              </div>

              <div class="glass rounded-xl p-6 border-l-4" style="border-color:${primary}">
                <div class="flex items-center gap-2 mb-4"><i data-lucide="brain" class="w-5 h-5" style="color:${primary}"></i><h3 class="font-semibold">AI Recommendations</h3></div>
                <div class="space-y-3">
                  ${[{text:'Reduce dining out by 30% and save ৳5,400/month',prio:'High'},{text:'Transfer ৳60,000 to high-yield savings',prio:'Medium'},{text:'Cancel unused subscriptions: ৳449/month',prio:'Low'}].map(r=>`
                    <div class="p-3 rounded-lg bg-white/40 text-sm"><div class="flex justify-between mb-1"><span class="text-xs font-medium" style="color:${primary}">${r.prio}</span></div><p class="opacity-80">${r.text}</p></div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="glass rounded-xl p-6">
              <h3 class="font-semibold mb-4">Budget Progress</h3>
              <div class="space-y-4">
                ${[{cat:'Housing',spent:54000,total:60000,color:primary},{cat:'Food & Dining',spent:18600,total:24000,color:'#f59e0b'},{cat:'Transportation',spent:5400,total:12000,color:'#10b981'},{cat:'Entertainment',spent:7500,total:9000,color:'#ec4899'}].map(b=>`
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span>${b.cat}</span><span class="opacity-60">৳${b.spent.toLocaleString('en-US')} / ৳${b.total.toLocaleString('en-US')}</span></div>
                    <div class="h-2 rounded-full bg-gray-200/50"><div class="h-full rounded-full progress-bar" style="width:${(b.spent/b.total*100).toFixed(0)}%;background:${b.color}"></div></div>
                  </div>
                `).join('')}
              </div>
            </div>
          </main>
        </div>
      `;
    }

    function renderAdmin(app, c) {
      const primary = c.primary_color || defaultConfig.primary_color;
      app.innerHTML = `
        <div class="flex h-full">
          <aside class="hidden md:flex flex-col w-60 glass border-r border-white/20 p-4">
            <div class="flex items-center gap-2 mb-8 px-2">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${primary}"><i data-lucide="shield" class="w-4 h-4 text-white"></i></div>
              <span class="font-semibold">Admin</span>
            </div>
            <nav class="flex-1 space-y-1">
              ${[{icon:'users',label:'Users',active:true},{icon:'bar-chart-2',label:'Analytics'},{icon:'settings',label:'Settings'},{icon:'alert-triangle',label:'Reports'}].map(i=>`
                <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm ${i.active?'active':'opacity-60'}"><i data-lucide="${i.icon}" class="w-4 h-4"></i>${i.label}</a>
              `).join('')}
            </nav>
            <a href="#" onclick="navigate('dashboard')" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm opacity-60"><i data-lucide="arrow-left" class="w-4 h-4"></i>Back to App</a>
          </aside>

          <main class="flex-1 overflow-auto p-6">
            <header class="flex justify-between items-center mb-8">
              <h1 class="text-2xl font-bold">Admin Dashboard</h1>
              <div class="flex items-center gap-3">
                <button class="p-2 rounded-lg hover:bg-white/50"><i data-lucide="bell" class="w-5 h-5"></i></button>
                <button class="p-2 rounded-lg hover:bg-white/50"><i data-lucide="settings" class="w-5 h-5"></i></button>
              </div>
            </header>

            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
              ${[{label:'Total Users',val:'12,847',icon:'users'},{label:'Active Today',val:'3,291',icon:'activity'},{label:'Revenue',val:'৳4,82,000',icon:'dollar-sign'},{label:'System Health',val:'99.9%',icon:'heart'}].map(s=>`
                <div class="glass rounded-xl p-5"><div class="flex justify-between items-start mb-2"><span class="text-xs opacity-60">${s.label}</span><i data-lucide="${s.icon}" class="w-4 h-4 opacity-40"></i></div><div class="text-xl font-bold">${s.val}</div></div>
              `).join('')}
            </div>

            <div class="glass rounded-xl p-6 mb-6">
              <div class="flex justify-between items-center mb-4"><h3 class="font-semibold">User Management</h3><div class="flex gap-2"><input placeholder="Search users..." class="px-3 py-2 text-sm rounded-lg border border-gray-200 bg-white/60"><button class="px-3 py-2 text-sm rounded-lg text-white" style="background:${primary}">Filter</button></div></div>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead><tr class="border-b border-gray-200/50"><th class="text-left py-3 px-2 opacity-60 font-medium">Name</th><th class="text-left py-3 px-2 opacity-60 font-medium">Email</th><th class="text-left py-3 px-2 opacity-60 font-medium">Status</th><th class="text-left py-3 px-2 opacity-60 font-medium">Join Date</th></tr></thead>
                  <tbody>
                    ${[{name:'Sarah Chen',email:'sarah@email.com',status:'Active',date:'Jan 12'},{name:'Marcus Lee',email:'marcus@email.com',status:'Active',date:'Feb 3'},{name:'Emma Wilson',email:'emma@email.com',status:'Inactive',date:'Mar 18'},{name:'James Park',email:'james@email.com',status:'Active',date:'Apr 5'}].map(u=>`
                      <tr class="border-b border-gray-100/50 hover:bg-white/30"><td class="py-3 px-2 font-medium">${u.name}</td><td class="py-3 px-2 opacity-70">${u.email}</td><td class="py-3 px-2"><span class="px-2 py-0.5 rounded-full text-xs ${u.status==='Active'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}">${u.status}</span></td><td class="py-3 px-2 opacity-70">${u.date}</td></tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
              <div class="glass rounded-xl p-6">
                <h3 class="font-semibold mb-4">Traffic (7 Days)</h3>
                <div class="flex items-end gap-2 h-28">
                  ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>{const h=[60,75,50,85,90,45,55][i];return`<div class="flex-1 flex flex-col items-center gap-1"><div class="w-full rounded-t" style="height:${h}%;background:${primary}${h>70?'':'40'}"></div><span class="text-xs opacity-50">${d}</span></div>`}).join('')}
                </div>
              </div>
              <div class="glass rounded-xl p-6">
                <h3 class="font-semibold mb-4">System Status</h3>
                <div class="space-y-3">
                  ${[{label:'API Response',val:'42ms',pct:95},{label:'Database Load',val:'23%',pct:23},{label:'Memory Usage',val:'67%',pct:67}].map(s=>`
                    <div><div class="flex justify-between text-sm mb-1"><span>${s.label}</span><span class="opacity-60">${s.val}</span></div><div class="h-2 rounded-full bg-gray-200/50"><div class="h-full rounded-full" style="width:${s.pct}%;background:${s.pct>80?'#ef4444':primary}"></div></div></div>
                  `).join('')}
                </div>
              </div>
            </div>
          </main>
        </div>
      `;
    }

    // Fallback environment lifecycle implementation
    if (!window.elementSdk) {
      window.elementSdk = {
        init: function(options) {
          if (options && typeof options.onConfigChange === 'function') {
            options.onConfigChange(defaultConfig);
          }
        },
        setConfig: function(updatedConfig) {
          Object.assign(defaultConfig, updatedConfig);
          render();
        }
      };
    }

    // Initialize layout engine
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { render(); }
    });

  </script>
 </body>
</html>
